<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>روتین سبک زندگی - Enerzist</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: var(--tg-theme-bg-color, #f5f5f5);
    color: var(--tg-theme-text-color, #333);
    padding: 16px;
    font-size: 14px;
  }
  h1 { font-size: 18px; margin-bottom: 16px; text-align: center; }
  h2 { font-size: 15px; margin: 16px 0 8px; color: var(--tg-theme-hint-color, #666); }
  .section { background: var(--tg-theme-secondary-bg-color, #fff); border-radius: 12px; padding: 12px; margin-bottom: 12px; }
  .item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
  .item:last-child { border-bottom: none; }
  .item input[type="checkbox"] { width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0; accent-color: var(--tg-theme-button-color, #2481cc); }
  .item label { flex: 1; line-height: 1.5; cursor: pointer; }
  .item label.checked { text-decoration: line-through; opacity: 0.5; }
  textarea {
    width: 100%; border: 1px solid rgba(0,0,0,0.15); border-radius: 8px;
    padding: 8px; font-family: inherit; font-size: 13px; resize: vertical;
    background: var(--tg-theme-bg-color, #f9f9f9); color: var(--tg-theme-text-color, #333);
    min-height: 70px; margin-top: 6px;
  }
  .save-btn {
    width: 100%; padding: 14px; background: var(--tg-theme-button-color, #2481cc);
    color: var(--tg-theme-button-text-color, #fff); border: none; border-radius: 12px;
    font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 8px;
  }
  .save-btn:active { opacity: 0.85; }
  .progress { text-align: center; font-size: 13px; color: var(--tg-theme-hint-color, #888); margin-bottom: 12px; }
  .gratitude-label { font-size: 13px; color: var(--tg-theme-hint-color, #666); margin-bottom: 2px; display: block; }
</style>
</head>
<body>

<h1>🌿 روتین سبک زندگی</h1>
<div class="progress" id="progressText">در حال بارگذاری...</div>

<div class="section">
  <h2>🌅 روتین صبحگاهی</h2>
  <div class="item"><input type="checkbox" id="c1"><label for="c1">بیدار شدن در ساعت مشخص</label></div>
  <div class="item"><input type="checkbox" id="c2"><label for="c2">نوشیدن آب (۲ لیوان)</label></div>
  <div class="item"><input type="checkbox" id="c3"><label for="c3">ورزش یا کشش صبحگاهی (۱۵ دقیقه)</label></div>
  <div class="item"><input type="checkbox" id="c4"><label for="c4">مدیتیشن یا تنفس عمیق</label></div>
  <div class="item"><input type="checkbox" id="c5"><label for="c5">صبحانه سالم</label></div>
  <div class="item"><input type="checkbox" id="c6"><label for="c6">مرور برنامه روز</label></div>
</div>

<div class="section">
  <h2>🙏 شکرگزاری صبحگاهی</h2>
  <span class="gratitude-label">امروز برای چه چیزهایی شکرگزاری؟</span>
  <textarea id="morningGratitude" placeholder="مثال: سلامتی، خانواده، فرصت‌های جدید..."></textarea>
</div>

<div class="section">
  <h2>☀️ روتین روزانه</h2>
  <div class="item"><input type="checkbox" id="c7"><label for="c7">نوشیدن ۸ لیوان آب</label></div>
  <div class="item"><input type="checkbox" id="c8"><label for="c8">پیاده‌روی یا فعالیت بدنی</label></div>
  <div class="item"><input type="checkbox" id="c9"><label for="c9">وعده‌های غذایی منظم</label></div>
  <div class="item"><input type="checkbox" id="c10"><label for="c10">استراحت کوتاه هر ۹۰ دقیقه</label></div>
  <div class="item"><input type="checkbox" id="c11"><label for="c11">دوری از صفحه‌نمایش (۱ ساعت)</label></div>
</div>

<div class="section">
  <h2>🌙 روتین شبانه</h2>
  <div class="item"><input type="checkbox" id="c12"><label for="c12">شام سبک (۲ ساعت قبل از خواب)</label></div>
  <div class="item"><input type="checkbox" id="c13"><label for="c13">خاموش کردن صفحه‌نمایش (۱ ساعت قبل)</label></div>
  <div class="item"><input type="checkbox" id="c14"><label for="c14">مطالعه یا یادداشت‌نویسی</label></div>
  <div class="item"><input type="checkbox" id="c15"><label for="c15">آماده‌سازی لباس و وسایل فردا</label></div>
  <div class="item"><input type="checkbox" id="c16"><label for="c16">خواب در ساعت مشخص</label></div>
</div>

<div class="section">
  <h2>✨ شکرگزاری شبانگاهی</h2>
  <span class="gratitude-label">امشب برای چه لحظاتی سپاسگزاری؟</span>
  <textarea id="eveningGratitude" placeholder="مثال: یک مکالمه خوب، یک موفقیت کوچک، یک لحظه آرامش..."></textarea>
</div>

<div class="section">
  <h2>📝 یادداشت روزانه</h2>
  <textarea id="dailyNote" placeholder="امروز چطور بود؟ چه چیزی یاد گرفتی؟"></textarea>
</div>

<div class="section">
  <h2>🎯 هدف فردا</h2>
  <textarea id="tomorrowGoal" placeholder="مهم‌ترین کاری که فردا باید انجام دهی..."></textarea>
</div>

<button class="save-btn" onclick="saveData()">💾 ذخیره روتین امروز</button>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const userId = tg.initDataUnsafe?.user?.id || 'guest';
const STORAGE_KEY = `enerzist_routine_${userId}`;
const CHECKBOXES = Array.from({length: 16}, (_, i) => `c${i+1}`);

function updateProgress() {
  const done = CHECKBOXES.filter(id => document.getElementById(id)?.checked).length;
  document.getElementById('progressText').textContent = `${done} از ${CHECKBOXES.length} مورد انجام شده`;
}

function updateLabel(id) {
  const cb = document.getElementById(id);
  const label = document.querySelector(`label[for="${id}"]`);
  if (label) label.classList.toggle('checked', cb.checked);
}

function loadData() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const today = new Date().toDateString();
    const data = saved.date === today ? saved : {};

    CHECKBOXES.forEach(id => {
      const cb = document.getElementById(id);
      if (cb) { cb.checked = data.checks?.[id] || false; updateLabel(id); }
    });

    ['dailyNote', 'tomorrowGoal', 'morningGratitude', 'eveningGratitude'].forEach(id => {
      if (data[id]) document.getElementById(id).value = data[id];
    });
  } catch(e) {}
  updateProgress();
}

function saveData() {
  tg.HapticFeedback.impactOccurred('medium');
  const checks = {};
  CHECKBOXES.forEach(id => { checks[id] = document.getElementById(id)?.checked || false; });

  const data = {
    date: new Date().toDateString(),
    checks,
    dailyNote: document.getElementById('dailyNote').value,
    tomorrowGoal: document.getElementById('tomorrowGoal').value,
    morningGratitude: document.getElementById('morningGratitude').value,
    eveningGratitude: document.getElementById('eveningGratitude').value
  };

  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  tg.HapticFeedback.notificationOccurred('success');
  tg.showAlert('✅ روتین امروز ذخیره شد!');
}

CHECKBOXES.forEach(id => {
  document.getElementById(id)?.addEventListener('change', () => {
    tg.HapticFeedback.selectionChanged();
    updateLabel(id);
    updateProgress();
  });
});

tg.BackButton.show();
tg.BackButton.onClick(() => {
  tg.HapticFeedback.impactOccurred('light');
  tg.BackButton.hide();
  window.history.back();
});

loadData();
</script>
</body>
</html>
